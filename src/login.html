<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Vibe Journal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/src/css/style.css" />
</head>
<body class="auth-page">
  <div class="container-fluid h-100 d-flex align-items-center justify-content-center">
    <div class="card auth-card">
      <div class="card-body">
        <div class="text-center mb-4">
          <span class="auth-emoji">✨</span>
          <h1 class="mt-2">Vibe Journal</h1>
          <p class="text-muted">Welcome back</p>
        </div>

        <form id="loginForm">
          <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" placeholder="your@email.com" required />
          </div>

          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" placeholder="Your password" required />
          </div>

          <div id="errorAlert" class="alert alert-danger d-none" role="alert"></div>

          <button type="submit" class="btn btn-primary w-100 mb-3">Sign In</button>
        </form>

        <div class="text-center">
          <p class="text-muted mb-0">
            Don't have an account?
            <a href="/src/register.html" class="text-primary text-decoration-none">Create one</a>
          </p>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { login } from './js/auth.js'
    
    console.log('✓ LOGIN PAGE LOADED')
    
    const form = document.getElementById('loginForm')
    const errorAlert = document.getElementById('errorAlert')

    form.addEventListener('submit', async (e) => {
      e.preventDefault()
      
      const submitBtn = e.target.querySelector('button[type="submit"]')
      const originalText = submitBtn.textContent
      submitBtn.disabled = true
      submitBtn.textContent = 'Signing in...'

      const email = document.getElementById('email').value
      const password = document.getElementById('password').value

      console.log('🔄 Login attempt for:', email)
      const result = await login(email, password)
      console.log('Login result:', result)
      
      if (result.success) {
        console.log('✓ Login successful, user:', result.user?.email)
        console.log('⏳ Waiting for session to be saved...')
        // Wait for session to be persisted
        await new Promise(r => setTimeout(r, 1000))
        console.log('➡️ Redirecting to dashboard...')
        window.location.href = '/src/dashboard.html'
      } else {
        console.error('❌ Login failed:', result.error)
        errorAlert.textContent = result.error
        errorAlert.classList.remove('d-none')
        submitBtn.disabled = false
        submitBtn.textContent = originalText
      }
    })
  </script>
</body>
</html>

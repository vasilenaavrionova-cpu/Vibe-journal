<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - Vibe Journal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body class="bg-light">
  <!-- Navigation Bar -->
  <nav class="navbar navbar-expand-lg navbar-dark sticky-top" style="background: linear-gradient(135deg, #6366f1 0%, #7c3aed 100%);">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="/dashboard.html">
        <span style="font-size: 1.8rem; margin-right: 0.5rem;">✨</span>Vibe Journal
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a href="./add-entry.html" class="btn btn-light btn-sm me-2">+ New Mood</a>
          </li>
          <li class="nav-item">
            <button id="logoutBtn" class="btn btn-outline-light btn-sm">Logout</button>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="py-5">
    <div class="container-lg">
      <!-- Header Section -->
      <div class="row mb-5">
        <div class="col-12">
          <h1 class="display-5 fw-bold mb-2">Your Mood Journal</h1>
          <p class="text-muted lead">Track your emotions and precious moments</p>
          <hr class="my-3" style="opacity: 0.2;">
        </div>
      </div>

      <!-- Loading Spinner -->
      <div id="loadingSpinner" class="text-center py-5">
        <div class="spinner-border text-primary mb-3" role="status" style="width: 3rem; height: 3rem;">
          <span class="visually-hidden">Loading...</span>
        </div>
        <p class="text-muted">Loading your moods...</p>
      </div>

      <!-- Mood Cards Grid -->
      <div id="entriesContainer" class="row g-4 d-none"></div>

      <!-- Empty State -->
      <div id="emptyState" class="text-center py-5 d-none">
        <div style="font-size: 5rem; margin-bottom: 1rem; opacity: 0.5;">📔</div>
        <h3 class="mb-2">No moods recorded yet</h3>
        <p class="text-muted mb-4">Start capturing your feelings and moments today</p>
        <a href="./add-entry.html" class="btn btn-primary btn-lg">Create First Entry</a>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-dark text-light py-4 mt-5">
    <div class="container-fluid text-center">
      <p class="mb-0">&copy; 2026 Vibe Journal • Track your mood, live in the moment 🌈</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { requireAuth, logout } from './js/auth.js'
    import { getMoodEntries } from './js/dashboard.js'
    import { renderMoodCard } from './js/ui-helpers.js'

    // Ensure user is authenticated
    await requireAuth()

    const entriesContainer = document.getElementById('entriesContainer')
    const loadingSpinner = document.getElementById('loadingSpinner')
    const emptyState = document.getElementById('emptyState')
    const logoutBtn = document.getElementById('logoutBtn')

    // Load and display entries
    async function loadDashboard() {
      const result = await getMoodEntries()
      loadingSpinner.classList.add('d-none')

      if (result.success) {
        const entries = result.entries

        if (entries.length === 0) {
          emptyState.classList.remove('d-none')
        } else {
          entriesContainer.classList.remove('d-none')
          entries.forEach((entry) => {
            const card = renderMoodCard(entry)
            entriesContainer.appendChild(card)
          })
        }
      } else {
        alert(`Error loading entries: ${result.error}`)
      }
    }

    // Handle logout
    logoutBtn.addEventListener('click', async () => {
      const result = await logout()
      if (result.success) {
        alert('Logged out!')
        window.location.href = './login.html'
      } else {
        alert(`Error: ${result.error}`)
      }
    })

    // Load dashboard on page load
    loadDashboard()
  </script>
</body>
</html>

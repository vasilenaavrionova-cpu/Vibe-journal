<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - Vibe Journal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand" href="/dashboard.html">
        <span class="brand-emoji">✨</span> Vibe Journal
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <div class="ms-auto d-flex gap-2">
          <a href="/add-entry.html" class="btn btn-light btn-sm">+ New Mood</a>
          <button id="logoutBtn" class="btn btn-outline-light btn-sm">Logout</button>
        </div>
      </div>
    </div>
  </nav>

  <main class="py-5">
    <div class="container">
      <div class="row mb-4">
        <div class="col-md-8">
          <h1>Your Mood Journal</h1>
          <p class="text-muted">Track your emotions and precious moments</p>
        </div>
      </div>

      <div id="loadingSpinner" class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>

      <div id="entriesContainer" class="row d-none"></div>

      <div id="emptyState" class="text-center py-5 d-none">
        <div style="font-size: 4rem; margin-bottom: 1rem;">📔</div>
        <h3>No moods recorded yet</h3>
        <p class="text-muted mb-3">Start capturing your feelings and moments</p>
        <a href="/add-entry.html" class="btn btn-primary">Create First Entry</a>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container text-center">
      <p>&copy; 2026 Vibe Journal. Track your mood, live in the moment.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { requireAuth, logout, getCurrentUser } from './js/auth.js'
    import { getMoodEntries } from './js/dashboard.js'
    import { renderMoodCard } from './js/ui-helpers.js'

    // Ensure user is authenticated
    await requireAuth()

    const entriesContainer = document.getElementById('entriesContainer')
    const loadingSpinner = document.getElementById('loadingSpinner')
    const emptyState = document.getElementById('emptyState')
    const logoutBtn = document.getElementById('logoutBtn')

    // Load and display entries
    async function loadDashboard() {
      const result = await getMoodEntries()

      loadingSpinner.classList.add('d-none')

      if (result.success) {
        const entries = result.entries

        if (entries.length === 0) {
          emptyState.classList.remove('d-none')
        } else {
          entriesContainer.classList.remove('d-none')
          entries.forEach((entry) => {
            const card = renderMoodCard(entry)
            entriesContainer.appendChild(card)
          })
        }
      } else {
        alert(`Error loading entries: ${result.error}`)
      }
    }

    // Handle logout
    logoutBtn.addEventListener('click', async () => {
      const result = await logout()
      if (result.success) {
        alert('Logged out!')
        window.location.href = '/login.html'
      } else {
        alert(`Error: ${result.error}`)
      }
    })

    // Load dashboard on page load
    loadDashboard()
  </script>
</body>
</html>

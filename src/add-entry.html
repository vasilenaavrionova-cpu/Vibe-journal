<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Entry - Vibe Journal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/src/css/style.css" />
</head>
<body data-page="add-entry">
  <nav class="navbar navbar-expand-lg navbar-dark sticky-top w-100" style="background: linear-gradient(135deg, #6366f1 0%, #7c3aed 100%);">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="/src/index.html">
        <span style="font-size: 1.8rem; margin-right: 0.5rem;">✨</span>Vibe Journal
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a href="/src/info.html" class="nav-link">Info</a>
          </li>
          <li class="nav-item">
            <a href="/src/dashboard.html" class="nav-link">Dashboard</a>
          </li>
          <li class="nav-item">
            <a href="/src/mood-quest.html" class="nav-link">Mood Quest</a>
          </li>
          <li class="nav-item">
            <a href="/src/vibe-lab.html" class="nav-link">Vibe Lab</a>
          </li>
          <li class="nav-item">
            <a href="/src/add-entry.html" class="btn btn-light btn-sm me-2">+ New Entry</a>
          </li>
          <li class="nav-item">
            <button id="logoutBtn" class="btn btn-outline-light btn-sm">Logout</button>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container py-5">
    <div style="max-width: 600px; margin: 0 auto;">
      <div class="row mb-4">
        <div class="col">
          <h1 id="pageTitle">How are you feeling?</h1>
          <p class="text-muted" id="pageSubtitle">Capture your mood and a moment</p>
        </div>
      </div>

      <div class="card">
        <div class="card-body">
          <form id="moodForm">
            <div class="mb-4">
              <label for="moodSelect" class="form-label fw-bold">Mood</label>
              <select class="form-select form-select-lg" id="moodSelect" required>
                <option value="">Select a mood...</option>
                <option value="happy">😊 Happy</option>
                <option value="sad">😢 Sad</option>
                <option value="neutral">😐 Neutral</option>
                <option value="excited">🤩 Excited</option>
                <option value="anxious">😰 Anxious</option>
                <option value="calm">😌 Calm</option>
              </select>
            </div>

            <div class="mb-4">
              <label for="description" class="form-label fw-bold">What's on your mind?</label>
              <textarea
                class="form-control"
                id="description"
                rows="5"
                placeholder="Share your thoughts, feelings, and moments..."
                required
              ></textarea>
              <small class="text-muted">Max 500 characters</small>
            </div>

            <div class="mb-4">
              <label for="imageInput" class="form-label fw-bold">Add a photo (optional)</label>
              <input type="file" class="form-control" id="imageInput" accept="image/*" />
              <small class="text-muted">Formats: JPG, PNG, WebP. Max 5MB</small>
            </div>

            <div class="d-grid gap-2 d-sm-flex">
              <button type="submit" class="btn btn-primary btn-lg" id="submitBtn">Create Mood</button>
              <a href="/dashboard.html" class="btn btn-outline-secondary btn-lg">Cancel</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer w-100 py-4">
    <div class="container text-center">
      <p class="mb-0">&copy; 2026 Vibe Journal. Track your mood, live in the moment.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { requireAuth } from './js/auth.js'
    import { initAddEntryForm } from './js/ui-helpers.js'

    // Ensure user is authenticated
    await requireAuth()

    // Initialize the form
    initAddEntryForm()
  </script>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
